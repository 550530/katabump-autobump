name: KataBump Python Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1,13 * * *' # 每天北京时间 9:00 和 21:00 运行

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run KataBump Script
        env:
          KATA_EMAIL: ${{ secrets.USER_EMAIL }}
          KATA_PASSWORD: ${{ secrets.USER_PASSWORD }}
          KATA_SERVER_ID: '185829' # 如果你的 ID 不同请修改
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python katabump.py
