name: KataBump Auto Renew

# 触发规则：定时 + 手动
on:
  schedule:
    - cron: '0 1,13 * * *'  # 北京时间 9:00、21:00 运行（UTC+8）
  workflow_dispatch:        # 手动触发

permissions:
  contents: read

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 安装Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # 3. 安装依赖（requests + socks5支持）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pysocks
      
      # 4. 运行脚本（映射所有环境变量）
      - name: Run KataBump renew script
        env:
          # 核心变量（严格匹配你的Secrets名称）
          KATA_SERVER_ID: ${{ secrets.KATA_SERVER_ID }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Socks5代理（可选，需在Secrets中配置）
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
          # 其他配置
          EXECUTOR_NAME: ${{ secrets.EXECUTOR_NAME }}
        run: |
          # 调试：验证变量是否传递（仅显示前4位，避免泄露）
          echo "USER_EMAIL: ${USER_EMAIL:0:4}****"
          echo "使用代理: ${SOCKS5_PROXY:+是}${SOCKS5_PROXY:-否}"
          # 执行脚本
          python katabump.py
