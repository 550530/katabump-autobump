# 工作流名称
name: KataBump Auto Renew

# 触发条件：定时触发 + 手动触发
on:
  # 定时触发（Cron 表达式，UTC 时间）
  # 脚本里注释的是 0 9,21 * * *（北京时间），UTC 比北京时间晚 8 小时，所以对应 1,13 * * *
  schedule:
    - cron: '0 1,13 * * *'  # 北京时间 9:00、21:00 运行（UTC 1:00、13:00）
  # 手动触发（方便测试）
  workflow_dispatch:

# 运行权限
permissions:
  contents: read

# 工作流任务
jobs:
  run-script:
    # 运行环境（选 Ubuntu 最新版）
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1：拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 步骤 2：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 兼容脚本的 Python 版本
      
      # 步骤 3：安装依赖（脚本依赖 requests，需要安装）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      # 步骤 4：运行脚本
      - name: Run KataBump renew script
        env:
          # 把 Secrets 注入为环境变量（和脚本里的变量名对应）
          KATA_EMAIL: ${{ secrets.KATA_EMAIL }}
          KATA_PASSWORD: ${{ secrets.KATA_PASSWORD }}
          KATA_SERVER_ID: ${{ secrets.KATA_SERVER_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
          EXECUTOR_NAME: ${{ secrets.EXECUTOR_NAME }}
        run: |
          python katabump.py
